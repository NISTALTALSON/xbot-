name: AISecurityDaily Bot — Hourly

on:
  schedule:
    # Runs every hour at :00
    - cron: '0 * * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # kill if it hangs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore persistent state files from cache
      # These track what's been posted and engaged — critical for dedup
      - name: Restore bot state
        uses: actions/cache@v4
        with:
          path: |
            posted_items.json
            engaged_items.json
            used_replies.json
          key: bot-state-${{ github.run_id }}
          restore-keys: |
            bot-state-

      - name: Run bot
        env:
          BLUESKY_HANDLE:        ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD:  ${{ secrets.BLUESKY_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID:   ${{ secrets.TELEGRAM_CHANNEL_ID }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
        run: python xbot.py

      # Save state after every run so next run knows what was posted/engaged
      - name: Commit state files back to repo
        run: |
          git config user.name  "AISecurityDaily Bot"
          git config user.email "bot@aisecuritydaily"
          git add posted_items.json engaged_items.json used_replies.json || true
          git diff --cached --quiet || git commit -m "bot: state update [$(date '+%Y-%m-%d %H:%M')]"
          git push || true
